<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Erreur serveur · Readnest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #f0e8d8;
      color: #1a1208;
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #d4c4a8;
      margin-bottom: 2.5rem;
    }

    .rule {
      width: 60px;
      height: 1px;
      background: #d4c4a8;
      margin: 1.5rem auto;
    }

    .code {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 700;
      color: #d4c4a8;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: 700;
      color: #1a1208;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.95rem;
      color: #3d2e1e;
      font-style: italic;
      max-width: 400px;
      line-height: 1.7;
      margin: 0 auto;
    }

    a {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.6rem 1.75rem;
      background: #1a1208;
      color: #fdf9f3;
      text-decoration: none;
      font-family: 'Lora', Georgia, serif;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      border-radius: 2px;
      transition: background 0.2s ease;
    }

    a:hover { background: #b8860b; }
  </style>
</head>
<body>
  <img src="/logo.jpg" alt="Readnest" class="logo">
  <div class="code">500</div>
  <div class="rule"></div>
  <h1>Erreur inattendue</h1>
  <p>Quelque chose s'est mal passé de notre côté. Nous travaillons à résoudre le problème — revenez dans quelques instants.</p>
  <a href="/">Retour à l'accueil</a>
</body>
</html>
